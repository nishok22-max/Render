services:
  # ── Backend: FastAPI on Render Web Service ────────────────────────────────
  - type: web
    name: aether-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      # AWS Bedrock
      - key: AWS_ACCESS_KEY_ID
        sync: false          # Set manually in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: eu-north-1
      - key: MODEL_ID
        value: moonshotai.kimi-k2.5
      # AI APIs
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Web Research
      - key: TAVILY_API_KEY
        sync: false
      # Server
      - key: HOST
        value: 0.0.0.0
      # CORS — will be updated after frontend deploys
      - key: CORS_ORIGINS
        sync: false
      # RAG tuning
      - key: CHUNK_SIZE
        value: "1200"
      - key: CHUNK_OVERLAP
        value: "100"
      - key: TOP_K
        value: "5"
      - key: SIMILARITY_THRESHOLD
        value: "0.5"

  # ── Frontend: React/Vite as Static Site ──────────────────────────────────
  - type: web
    name: aether-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Points to the backend service above
      - key: VITE_API_URL
        sync: false          # Set to your backend URL: https://aether-backend.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
